<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Cloth Simulation</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;user-select:none}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0a0c}
body{touch-action:none}
canvas{display:block;width:100%;height:100%}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
(function(){
'use strict';

/*
 * Cloth Simulation — Verlet integration with constraints
 * Inspired by Coding Math / sutaburosu and many cloth sim repos
 * https://github.com/dissimulate/Tearable-Cloth (MIT)
 */

var canvas = document.getElementById('c');
var ctx = canvas.getContext('2d');

var W, H;
var COLS = 55;
var ROWS = 35;
var SPACING = 12;
var GRAVITY = 0.5;
var DAMPING = 0.99;
var CONSTRAINT_ITERS = 5;

var points = [];
var sticks = [];
var mouse = { x: 0, y: 0, px: 0, py: 0, down: false, button: 0 };

function Point(x, y, pinned) {
    this.x = x; this.y = y;
    this.ox = x; this.oy = y;
    this.pinned = pinned;
}

function Stick(p0, p1, len) {
    this.p0 = p0; this.p1 = p1;
    this.len = len;
    this.active = true;
}

function init() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;

    points = [];
    sticks = [];

    var startX = (W - COLS * SPACING) / 2;
    var startY = 40;

    for (var r = 0; r < ROWS; r++) {
        for (var c = 0; c < COLS; c++) {
            var pinned = (r === 0 && c % 4 === 0);
            points.push(new Point(startX + c * SPACING, startY + r * SPACING, pinned));
        }
    }

    // Horizontal sticks
    for (var r = 0; r < ROWS; r++) {
        for (var c = 0; c < COLS - 1; c++) {
            var i = r * COLS + c;
            sticks.push(new Stick(points[i], points[i + 1], SPACING));
        }
    }
    // Vertical sticks
    for (var r = 0; r < ROWS - 1; r++) {
        for (var c = 0; c < COLS; c++) {
            var i = r * COLS + c;
            sticks.push(new Stick(points[i], points[i + COLS], SPACING));
        }
    }
}

function updatePoints() {
    for (var i = 0; i < points.length; i++) {
        var p = points[i];
        if (p.pinned) continue;

        var vx = (p.x - p.ox) * DAMPING;
        var vy = (p.y - p.oy) * DAMPING;

        p.ox = p.x;
        p.oy = p.y;
        p.x += vx;
        p.y += vy + GRAVITY;

        // Mouse interaction
        if (mouse.down) {
            var dx = p.x - mouse.x;
            var dy = p.y - mouse.y;
            var dist = Math.sqrt(dx * dx + dy * dy);
            var radius = 50;

            if (mouse.button === 2) {
                // Right click: tear
                if (dist < 30) {
                    tearAt(p);
                }
            } else {
                // Left click: push
                if (dist < radius) {
                    var force = (radius - dist) / radius;
                    p.x += (mouse.x - mouse.px) * force * 1.8;
                    p.y += (mouse.y - mouse.py) * force * 1.8;
                }
            }
        }

        // Bounds
        if (p.y > H - 5) { p.y = H - 5; }
        if (p.x < 5) { p.x = 5; }
        if (p.x > W - 5) { p.x = W - 5; }
    }
}

function tearAt(p) {
    for (var i = sticks.length - 1; i >= 0; i--) {
        var s = sticks[i];
        if (s.active && (s.p0 === p || s.p1 === p)) {
            s.active = false;
        }
    }
}

function constrainSticks() {
    for (var iter = 0; iter < CONSTRAINT_ITERS; iter++) {
        for (var i = 0; i < sticks.length; i++) {
            var s = sticks[i];
            if (!s.active) continue;

            var dx = s.p1.x - s.p0.x;
            var dy = s.p1.y - s.p0.y;
            var dist = Math.sqrt(dx * dx + dy * dy);
            if (dist === 0) continue;

            var diff = (s.len - dist) / dist * 0.5;
            var ox = dx * diff;
            var oy = dy * diff;

            if (!s.p0.pinned) { s.p0.x -= ox; s.p0.y -= oy; }
            if (!s.p1.pinned) { s.p1.x += ox; s.p1.y += oy; }

            // Tear if stretched too far
            if (dist > s.len * 4) s.active = false;
        }
    }
}

function render() {
    ctx.clearRect(0, 0, W, H);

    // Draw fabric with shading
    for (var r = 0; r < ROWS - 1; r++) {
        for (var c = 0; c < COLS - 1; c++) {
            var i = r * COLS + c;
            var p0 = points[i];
            var p1 = points[i + 1];
            var p2 = points[i + COLS];
            var p3 = points[i + COLS + 1];

            // Check if any connecting sticks are torn
            var h0 = isStickActive(p0, p1) && isStickActive(p0, p2);
            var h1 = isStickActive(p1, p3) && isStickActive(p2, p3);
            if (!h0 && !h1) continue;

            // Shade by y position (depth-like)
            var avgY = (p0.y + p1.y + p2.y + p3.y) / 4;
            var shade = Math.min(1, avgY / H);
            var r1 = Math.floor(30 + shade * 60);
            var g1 = Math.floor(100 + shade * 80);
            var b1 = Math.floor(180 + shade * 75);
            var alpha = 0.8;

            ctx.beginPath();
            ctx.moveTo(p0.x, p0.y);
            ctx.lineTo(p1.x, p1.y);
            ctx.lineTo(p3.x, p3.y);
            ctx.lineTo(p2.x, p2.y);
            ctx.closePath();
            ctx.fillStyle = 'rgba(' + r1 + ',' + g1 + ',' + b1 + ',' + alpha + ')';
            ctx.fill();
        }
    }

    // Draw pin points
    for (var i = 0; i < points.length; i++) {
        var p = points[i];
        if (p.pinned) {
            ctx.beginPath();
            ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255,255,255,0.5)';
            ctx.fill();
        }
    }
}

// Quick lookup cache for active sticks
var stickMap = {};

function buildStickMap() {
    stickMap = {};
    for (var i = 0; i < sticks.length; i++) {
        var s = sticks[i];
        if (!s.active) continue;
        var k1 = points.indexOf(s.p0) + '_' + points.indexOf(s.p1);
        var k2 = points.indexOf(s.p1) + '_' + points.indexOf(s.p0);
        stickMap[k1] = true;
        stickMap[k2] = true;
    }
}

function isStickActive(pa, pb) {
    // Simplified: just check if both are close enough
    var dx = pa.x - pb.x;
    var dy = pa.y - pb.y;
    return Math.sqrt(dx * dx + dy * dy) < SPACING * 4;
}

function frame() {
    requestAnimationFrame(frame);
    updatePoints();
    constrainSticks();
    render();
}

init();
window.addEventListener('resize', init);

// Mouse
canvas.addEventListener('mousedown', function(e) {
    mouse.down = true;
    mouse.button = e.button;
    mouse.x = mouse.px = e.clientX;
    mouse.y = mouse.py = e.clientY;
});
canvas.addEventListener('mousemove', function(e) {
    mouse.px = mouse.x;
    mouse.py = mouse.y;
    mouse.x = e.clientX;
    mouse.y = e.clientY;
});
window.addEventListener('mouseup', function() { mouse.down = false; });
canvas.addEventListener('contextmenu', function(e) { e.preventDefault(); });

// Touch
canvas.addEventListener('touchstart', function(e) {
    e.preventDefault();
    mouse.down = true;
    mouse.button = 0;
    mouse.x = mouse.px = e.touches[0].clientX;
    mouse.y = mouse.py = e.touches[0].clientY;
}, {passive:false});
canvas.addEventListener('touchmove', function(e) {
    e.preventDefault();
    mouse.px = mouse.x;
    mouse.py = mouse.y;
    mouse.x = e.touches[0].clientX;
    mouse.y = e.touches[0].clientY;
}, {passive:false});
canvas.addEventListener('touchend', function() { mouse.down = false; });

requestAnimationFrame(frame);

window.addEventListener('message', function(e) { if (e.data && e.data.theme) {} });
try { window.parent.postMessage({type:'widget-ready'}, '*'); } catch(e) {}

})();
</script>
</body>
</html>
