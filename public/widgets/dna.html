<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Life</title>
<style>
  body { background: transparent; margin: 0; overflow: hidden; }
  canvas { display: block; width: 100vw; height: 100vh; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const C = document.getElementById('c');
const gl = C.getContext('webgl', { alpha: true, premultipliedAlpha: false });

const S = 256;    // simulation grid
const BL = 128;   // bloom blur resolution (half)
let dk = true;

window.addEventListener('message', e => { if (e.data?.theme) dk = e.data.theme === 'dark'; });
window.parent.postMessage({ type: 'widget-ready' }, '*');

function resize() { C.width = innerWidth; C.height = innerHeight; }
resize();
addEventListener('resize', resize);

/* ── GL helpers ─────────────────────────────── */
function mkS(src, type) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) console.error(gl.getShaderInfoLog(s));
  return s;
}
function mkP(vs, fs) {
  const p = gl.createProgram();
  gl.attachShader(p, mkS(vs, gl.VERTEX_SHADER));
  gl.attachShader(p, mkS(fs, gl.FRAGMENT_SHADER));
  gl.linkProgram(p);
  if (!gl.getProgramParameter(p, gl.LINK_STATUS)) console.error(gl.getProgramInfoLog(p));
  return p;
}

const qb = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, qb);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);

function quad(p) {
  gl.bindBuffer(gl.ARRAY_BUFFER, qb);
  const a = gl.getAttribLocation(p, 'a');
  gl.enableVertexAttribArray(a);
  gl.vertexAttribPointer(a, 2, gl.FLOAT, false, 0, 0);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
}

function mkFBO(w, h, filter) {
  const t = gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D, t);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, w, h, 0, gl.RGBA, gl.UNSIGNED_BYTE, null);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, filter);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, filter);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.REPEAT);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.REPEAT);
  const f = gl.createFramebuffer();
  gl.bindFramebuffer(gl.FRAMEBUFFER, f);
  gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, t, 0);
  return { t, f };
}

/* ── Framebuffers ───────────────────────────── */
let stA = mkFBO(S, S, gl.NEAREST);   // simulation ping
let stB = mkFBO(S, S, gl.NEAREST);   // simulation pong
let colFBO = mkFBO(S, S, gl.LINEAR); // color output
let blA = mkFBO(BL, BL, gl.LINEAR);  // bloom ping
let blB = mkFBO(BL, BL, gl.LINEAR);  // bloom pong

/* ── Seed ───────────────────────────────────── */
function seed() {
  const d = new Uint8Array(S * S * 4);
  for (let i = 0; i < S * S; i++) {
    const alive = Math.random() > 0.82 ? 255 : 0;
    d[i * 4] = alive;       // R = alive
    d[i * 4 + 1] = 0;       // G = age
    d[i * 4 + 2] = 0;       // B = trail
    d[i * 4 + 3] = 255;
  }
  gl.bindTexture(gl.TEXTURE_2D, stA.t);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, S, S, 0, gl.RGBA, gl.UNSIGNED_BYTE, d);
}
seed();
setInterval(seed, 10000);

/* ── Shaders ────────────────────────────────── */
const VS = `
  attribute vec2 a;
  varying vec2 v;
  void main() { v = a * .5 + .5; gl_Position = vec4(a, 0, 1); }
`;

// Conway B3/S23 on GPU — tracks age + death trail
const SIM_FS = `
precision highp float;
varying vec2 v;
uniform sampler2D u;
uniform vec2 px;

void main() {
  vec4 c = texture2D(u, v);
  float alive = step(.5, c.r);
  float age   = c.g;
  float trail = c.b;

  // Count 8 neighbors (REPEAT wrapping handles edges)
  float n = 0.0;
  for (int dy = -1; dy <= 1; dy++)
    for (int dx = -1; dx <= 1; dx++) {
      if (dx == 0 && dy == 0) continue;
      n += step(.5, texture2D(u, v + vec2(float(dx), float(dy)) * px).r);
    }

  // Birth (3 neighbors) or Survival (2-3 neighbors)
  float born = step(2.5, n) * step(n, 3.5) * (1.0 - alive);
  float surv = alive * step(1.5, n) * step(n, 3.5);
  float na   = max(born, surv);

  // Age increments each gen; resets on birth
  float nAge = na > .5 ? (alive > .5 ? min(age + 1.0 / 255.0, 1.0) : 0.0) : 0.0;

  // Trail: starts on death, decays each frame
  float nTrail = trail * 0.92;
  if (alive > .5 && na < .5) nTrail = 1.0; // just died
  if (na > .5) nTrail = 0.0;               // alive = no trail

  gl_FragColor = vec4(na, nAge, nTrail, 1.0);
}
`;

// Color mapping — bioluminescent palette
const COL_FS = `
precision highp float;
varying vec2 v;
uniform sampler2D u;
uniform float dm;

vec3 palette(float t, float isDark) {
  vec3 a, b, c, d;
  if (isDark > .5) {
    // Bioluminescent: bright cyan → electric blue → hot magenta → deep violet
    a = vec3(0.05, 1.0, 0.85);
    b = vec3(0.25, 0.45, 1.0);
    c = vec3(0.9, 0.15, 1.0);
    d = vec3(0.38, 0.0, 0.58);
  } else {
    // Deeper for light bg: teal → navy → purple → dark violet
    a = vec3(0.0, 0.58, 0.5);
    b = vec3(0.1, 0.22, 0.7);
    c = vec3(0.55, 0.06, 0.6);
    d = vec3(0.28, 0.0, 0.38);
  }
  if (t < 0.33) return mix(a, b, t / 0.33);
  if (t < 0.66) return mix(b, c, (t - 0.33) / 0.33);
  return mix(c, d, (t - 0.66) / 0.34);
}

void main() {
  vec4 s = texture2D(u, v);
  vec3 col  = vec3(0.0);
  float alp = 0.0;

  if (s.r > .5) {
    // Living cell — age-based color + white-hot core for young cells
    col = palette(s.g, dm);
    col = mix(col, vec3(1.0), 0.3 * (1.0 - smoothstep(0.0, 0.15, s.g)));
    alp = 0.95;
  } else if (s.b > 0.01) {
    // Death trail — fading purple ghost
    vec3 tc = dm > .5 ? vec3(0.35, 0.02, 0.55) : vec3(0.2, 0.01, 0.32);
    float ta = s.b * (dm > .5 ? 0.5 : 0.35);
    col = tc;
    alp = ta;
  }

  gl_FragColor = vec4(col, alp);
}
`;

// 9-tap separable Gaussian blur
const BLUR_FS = `
precision highp float;
varying vec2 v;
uniform sampler2D u;
uniform vec2 dir;

void main() {
  vec4 s = vec4(0.0);
  s += texture2D(u, v - dir * 4.0) * 0.016216;
  s += texture2D(u, v - dir * 3.0) * 0.054054;
  s += texture2D(u, v - dir * 2.0) * 0.121621;
  s += texture2D(u, v - dir * 1.0) * 0.194594;
  s += texture2D(u, v)             * 0.227027;
  s += texture2D(u, v + dir * 1.0) * 0.194594;
  s += texture2D(u, v + dir * 2.0) * 0.121621;
  s += texture2D(u, v + dir * 3.0) * 0.054054;
  s += texture2D(u, v + dir * 4.0) * 0.016216;
  gl_FragColor = s;
}
`;

// Final composite: sharp cells + soft bloom halo
const COMP_FS = `
precision highp float;
varying vec2 v;
uniform sampler2D orig;
uniform sampler2D bloom;
uniform float str;

void main() {
  vec4 a = texture2D(orig, v);
  vec4 b = texture2D(bloom, v);

  vec3 col = a.rgb + b.rgb * str;
  float alp = min(a.a + b.a * str * 0.7, 1.0);

  gl_FragColor = vec4(col, alp);
}
`;

/* ── Programs + uniforms ────────────────────── */
const pSim  = mkP(VS, SIM_FS);
const pCol  = mkP(VS, COL_FS);
const pBlur = mkP(VS, BLUR_FS);
const pComp = mkP(VS, COMP_FS);

const uSim  = { u: gl.getUniformLocation(pSim, 'u'),  px: gl.getUniformLocation(pSim, 'px') };
const uCol  = { u: gl.getUniformLocation(pCol, 'u'),  dm: gl.getUniformLocation(pCol, 'dm') };
const uBlur = { u: gl.getUniformLocation(pBlur, 'u'), dir: gl.getUniformLocation(pBlur, 'dir') };
const uComp = {
  orig:  gl.getUniformLocation(pComp, 'orig'),
  bloom: gl.getUniformLocation(pComp, 'bloom'),
  str:   gl.getUniformLocation(pComp, 'str'),
};

/* ── Render loop ────────────────────────────── */
function frame() {
  requestAnimationFrame(frame);

  // 1 ── Simulation step (A → B, then swap)
  gl.viewport(0, 0, S, S);
  gl.bindFramebuffer(gl.FRAMEBUFFER, stB.f);
  gl.useProgram(pSim);
  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D, stA.t);
  gl.uniform1i(uSim.u, 0);
  gl.uniform2f(uSim.px, 1 / S, 1 / S);
  quad(pSim);
  [stA, stB] = [stB, stA];

  // 2 ── Color mapping
  gl.bindFramebuffer(gl.FRAMEBUFFER, colFBO.f);
  gl.useProgram(pCol);
  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D, stA.t);
  gl.uniform1i(uCol.u, 0);
  gl.uniform1f(uCol.dm, dk ? 1 : 0);
  quad(pCol);

  // 3 ── Bloom: 2× separable Gaussian blur at half res
  gl.viewport(0, 0, BL, BL);
  gl.useProgram(pBlur);

  // Pass 1 — horizontal
  gl.bindFramebuffer(gl.FRAMEBUFFER, blA.f);
  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D, colFBO.t);
  gl.uniform1i(uBlur.u, 0);
  gl.uniform2f(uBlur.dir, 1.5 / BL, 0);
  quad(pBlur);

  // Pass 1 — vertical
  gl.bindFramebuffer(gl.FRAMEBUFFER, blB.f);
  gl.bindTexture(gl.TEXTURE_2D, blA.t);
  gl.uniform2f(uBlur.dir, 0, 1.5 / BL);
  quad(pBlur);

  // Pass 2 — wider horizontal
  gl.bindFramebuffer(gl.FRAMEBUFFER, blA.f);
  gl.bindTexture(gl.TEXTURE_2D, blB.t);
  gl.uniform2f(uBlur.dir, 2.5 / BL, 0);
  quad(pBlur);

  // Pass 2 — wider vertical
  gl.bindFramebuffer(gl.FRAMEBUFFER, blB.f);
  gl.bindTexture(gl.TEXTURE_2D, blA.t);
  gl.uniform2f(uBlur.dir, 0, 2.5 / BL);
  quad(pBlur);

  // 4 ── Composite sharp cells + bloom → screen
  gl.viewport(0, 0, C.width, C.height);
  gl.bindFramebuffer(gl.FRAMEBUFFER, null);
  gl.clearColor(0, 0, 0, 0);
  gl.clear(gl.COLOR_BUFFER_BIT);

  gl.useProgram(pComp);
  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D, colFBO.t);
  gl.uniform1i(uComp.orig, 0);
  gl.activeTexture(gl.TEXTURE1);
  gl.bindTexture(gl.TEXTURE_2D, blB.t);
  gl.uniform1i(uComp.bloom, 1);
  gl.uniform1f(uComp.str, dk ? 1.5 : 0.9);
  quad(pComp);
}

frame();
</script>
</body>
</html>
