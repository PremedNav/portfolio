<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Particle Life</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;user-select:none}
html,body{width:100%;height:100%;overflow:hidden;background:#050508}
body{touch-action:none}
canvas{display:block;width:100%;height:100%}
#ui{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:2px;z-index:100;
  background:rgba(12,12,12,.82);backdrop-filter:blur(20px) saturate(1.4);-webkit-backdrop-filter:blur(20px) saturate(1.4);
  padding:4px;border-radius:14px;border:1px solid rgba(255,255,255,.06);
  box-shadow:0 8px 32px rgba(0,0,0,.45),0 1px 0 rgba(255,255,255,.04) inset}
.tb{font:500 11px/1 'Inter',-apple-system,system-ui,sans-serif;letter-spacing:.01em;
  background:transparent;border:1px solid transparent;
  color:rgba(255,255,255,.45);padding:7px 11px;border-radius:10px;cursor:pointer;
  transition:all .15s ease;white-space:nowrap;outline:none}
.tb:hover{background:rgba(255,255,255,.08);color:rgba(255,255,255,.85)}
.tb:active{transform:scale(.96)}
.sep{width:1px;height:16px;background:rgba(255,255,255,.06);flex-shrink:0;margin:0 2px}
#txtWrap{position:fixed;top:24px;left:50%;transform:translateX(-50%);z-index:100;
  background:rgba(12,12,12,.75);backdrop-filter:blur(20px) saturate(1.4);-webkit-backdrop-filter:blur(20px) saturate(1.4);
  padding:6px 8px;border-radius:16px;border:1px solid rgba(255,255,255,.08);
  box-shadow:0 8px 32px rgba(0,0,0,.5),0 1px 0 rgba(255,255,255,.04) inset;
  display:flex;align-items:center;gap:6px}
#txt{font:500 16px/1 'Inter',-apple-system,system-ui,sans-serif;
  background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);
  color:#fff;padding:10px 16px;border-radius:10px;outline:none;
  width:280px;letter-spacing:.04em;transition:all .2s}
#txt:focus{border-color:rgba(255,255,255,.3);background:rgba(255,255,255,.1)}
#txt::placeholder{color:rgba(255,255,255,.25);font-weight:400}
#charCount{font:400 11px/1 'Inter',sans-serif;color:rgba(255,255,255,.2);
  padding-right:4px;min-width:30px;text-align:center}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="txtWrap">
  <input id="txt" type="text" maxlength="24" placeholder="Type anything..." spellcheck="false" autocomplete="off">
  <span id="charCount">0/24</span>
</div>
<div id="ui">
  <button class="tb" id="rr">Randomize</button>
  <span class="sep"></span>
  <button class="tb" id="rs">Reset</button>
</div>
<script>
(function(){
'use strict';

var canvas = document.getElementById('c');
var ctx = canvas.getContext('2d');

var W, H;
var NUM_SPECIES = 6;
var TOTAL_PARTICLES = 1800;
var particles = [];
var rules = [];
var textTargets = [];
var textMode = false;

var COLORS = ['#ff6b6b','#51cf66','#339af0','#ffd43b','#cc5de8','#22b8cf'];

// Offscreen canvas for text sampling
var offCanvas = document.createElement('canvas');
var offCtx = offCanvas.getContext('2d');

function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
    offCanvas.width = W;
    offCanvas.height = H;
    if (textMode) sampleText(document.getElementById('txt').value);
}

function randomRules() {
    rules = [];
    for (var i = 0; i < NUM_SPECIES; i++) {
        rules[i] = [];
        for (var j = 0; j < NUM_SPECIES; j++) {
            rules[i][j] = (Math.random() * 2 - 1);
        }
    }
}

function initParticles() {
    particles = [];
    var perSpecies = Math.floor(TOTAL_PARTICLES / NUM_SPECIES);
    for (var s = 0; s < NUM_SPECIES; s++) {
        for (var i = 0; i < perSpecies; i++) {
            particles.push({
                x: Math.random() * W,
                y: Math.random() * H,
                vx: 0, vy: 0,
                species: s,
                tx: -1, ty: -1
            });
        }
    }
}

function sampleText(text) {
    textTargets = [];
    if (!text || !text.trim()) { textMode = false; clearTargets(); return; }
    textMode = true;

    offCtx.clearRect(0, 0, W, H);

    // Size text to fit ~70% of canvas width
    var fontSize = Math.min(W * 0.7 / (text.length * 0.6), H * 0.35);
    fontSize = Math.max(40, Math.min(fontSize, 200));

    offCtx.font = '900 ' + fontSize + 'px "Inter", "Arial Black", "Helvetica Neue", sans-serif';
    offCtx.textAlign = 'center';
    offCtx.textBaseline = 'middle';
    offCtx.fillStyle = '#fff';
    offCtx.fillText(text, W / 2, H / 2);

    // Sample pixels
    var data = offCtx.getImageData(0, 0, W, H).data;
    var step = Math.max(3, Math.floor(Math.sqrt(W * H / 8000)));
    var points = [];

    for (var y = 0; y < H; y += step) {
        for (var x = 0; x < W; x += step) {
            var idx = (y * W + x) * 4;
            if (data[idx + 3] > 128) {
                points.push({ x: x, y: y });
            }
        }
    }

    textTargets = points;
    assignTargets();
}

function assignTargets() {
    if (textTargets.length === 0) { clearTargets(); return; }

    // Shuffle particles for even distribution
    var shuffled = particles.slice().sort(function() { return Math.random() - 0.5; });

    for (var i = 0; i < shuffled.length; i++) {
        var target = textTargets[i % textTargets.length];
        // Add slight jitter so overlapping particles don't stack
        shuffled[i].tx = target.x + (Math.random() - 0.5) * 3;
        shuffled[i].ty = target.y + (Math.random() - 0.5) * 3;
    }
}

function clearTargets() {
    for (var i = 0; i < particles.length; i++) {
        particles[i].tx = -1;
        particles[i].ty = -1;
    }
}

function applyRules() {
    var maxDist = 120;
    var friction = 0.5;
    var force = 0.8;

    for (var i = 0; i < particles.length; i++) {
        var a = particles[i];
        var fx = 0, fy = 0;

        // Text target attraction — lerp directly toward target for speed
        if (textMode && a.tx >= 0) {
            var tdx = a.tx - a.x;
            var tdy = a.ty - a.y;
            var tdist = Math.sqrt(tdx * tdx + tdy * tdy);
            // Smooth lerp toward target
            var lerpAmt = 0.05;
            a.vx += tdx * lerpAmt;
            a.vy += tdy * lerpAmt;
            // Heavy damping so particles settle quickly
            a.vx *= 0.6;
            a.vy *= 0.6;
            a.x += a.vx;
            a.y += a.vy;
            if (a.x < 0) a.x += W;
            if (a.x >= W) a.x -= W;
            if (a.y < 0) a.y += H;
            if (a.y >= H) a.y -= H;
            continue; // skip particle-life rules entirely in text mode
        }

        // Particle-life rules (weaker during text mode)
        for (var j = 0; j < particles.length; j++) {
            if (i === j) continue;
            var b = particles[j];

            var dx = b.x - a.x;
            var dy = b.y - a.y;

            if (dx > W / 2) dx -= W;
            if (dx < -W / 2) dx += W;
            if (dy > H / 2) dy -= H;
            if (dy < -H / 2) dy += H;

            var dist = Math.sqrt(dx * dx + dy * dy);
            if (dist > 0 && dist < maxDist) {
                var g = rules[a.species][b.species];
                var f;
                if (dist < 25) {
                    f = (dist / 25 - 1) * 3;
                } else {
                    f = g * (1 - (dist - 25) / (maxDist - 25));
                }
                fx += (dx / dist) * f;
                fy += (dy / dist) * f;
            }
        }

        a.vx = (a.vx + fx * force) * friction;
        a.vy = (a.vy + fy * force) * friction;
        a.x += a.vx;
        a.y += a.vy;

        if (a.x < 0) a.x += W;
        if (a.x >= W) a.x -= W;
        if (a.y < 0) a.y += H;
        if (a.y >= H) a.y -= H;
    }
}

function render() {
    ctx.fillStyle = 'rgba(5,5,8,0.2)';
    ctx.fillRect(0, 0, W, H);

    for (var i = 0; i < particles.length; i++) {
        var p = particles[i];
        ctx.beginPath();
        ctx.arc(p.x, p.y, 2, 0, Math.PI * 2);
        ctx.fillStyle = COLORS[p.species];
        ctx.fill();
    }
}

function frame() {
    requestAnimationFrame(frame);
    applyRules();
    render();
}

resize();
window.addEventListener('resize', function() { resize(); initParticles(); });

randomRules();
initParticles();
requestAnimationFrame(frame);

// UI
var txtInput = document.getElementById('txt');
var charCount = document.getElementById('charCount');
var debounceTimer;
txtInput.addEventListener('input', function() {
    charCount.textContent = txtInput.value.length + '/24';
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(function() {
        sampleText(txtInput.value);
    }, 200);
});

// Prevent space from triggering buttons / page scroll
txtInput.addEventListener('keydown', function(e) {
    e.stopPropagation();
});

var txtWrap = document.getElementById('txtWrap');
txtWrap.addEventListener('mousedown', function(e) { e.stopPropagation(); });
txtWrap.addEventListener('touchstart', function(e) { e.stopPropagation(); }, {passive:true});

document.getElementById('rr').onclick = function() { randomRules(); if (textMode) assignTargets(); };
document.getElementById('rs').onclick = function() { txtInput.value = ''; textMode = false; randomRules(); initParticles(); };

var uiEl = document.getElementById('ui');
uiEl.addEventListener('mousedown', function(e) { e.stopPropagation(); });
uiEl.addEventListener('touchstart', function(e) { e.stopPropagation(); }, {passive:true});

window.addEventListener('message', function(e) { if (e.data && e.data.theme) {} });
try { window.parent.postMessage({type:'widget-ready'}, '*'); } catch(e) {}

})();
</script>
</body>
</html>
