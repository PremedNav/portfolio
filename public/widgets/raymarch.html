<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Ray Marching</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;user-select:none}
html,body{width:100%;height:100%;overflow:hidden;background:#000}
body{touch-action:none}
canvas{display:block;width:100%;height:100%}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
(function(){
'use strict';

/*
 * Ray Marching — SDF-based 3D rendering in a fragment shader
 * Inspired by Inigo Quilez's Shadertoy shaders
 * https://iquilezles.org/articles/distfunctions/
 */

var canvas = document.getElementById('c');
var gl = canvas.getContext('webgl', {alpha:false,depth:false,stencil:false,antialias:false})
       || canvas.getContext('experimental-webgl', {alpha:false,depth:false,stencil:false,antialias:false});

var vertSrc = 'attribute vec2 a;void main(){gl_Position=vec4(a,0,1);}';
var fragSrc = `
precision highp float;
uniform vec2 uRes;
uniform float uTime;
uniform vec2 uMouse;

// SDF primitives (Inigo Quilez)
float sdSphere(vec3 p, float r) { return length(p) - r; }
float sdBox(vec3 p, vec3 b) {
    vec3 q = abs(p) - b;
    return length(max(q, 0.0)) + min(max(q.x, max(q.y, q.z)), 0.0);
}
float sdTorus(vec3 p, vec2 t) {
    vec2 q = vec2(length(p.xz) - t.x, p.y);
    return length(q) - t.y;
}

float opSmoothUnion(float d1, float d2, float k) {
    float h = clamp(0.5 + 0.5 * (d2 - d1) / k, 0.0, 1.0);
    return mix(d2, d1, h) - k * h * (1.0 - h);
}

mat2 rot(float a) {
    float c = cos(a), s = sin(a);
    return mat2(c, -s, s, c);
}

float scene(vec3 p) {
    float t = uTime;

    // Floating morphing shapes
    vec3 p1 = p - vec3(sin(t * 0.7) * 1.5, cos(t * 0.5) * 0.8, sin(t * 0.3));
    float sphere = sdSphere(p1, 0.8 + 0.2 * sin(t * 1.3));

    vec3 p2 = p - vec3(-sin(t * 0.5) * 1.2, sin(t * 0.8) * 0.6, cos(t * 0.4));
    p2.xz *= rot(t * 0.5);
    p2.yz *= rot(t * 0.3);
    float box = sdBox(p2, vec3(0.6 + 0.1 * sin(t)));

    vec3 p3 = p - vec3(cos(t * 0.6) * 0.8, -0.5 + sin(t * 0.4) * 0.3, sin(t * 0.7) * 1.5);
    p3.xz *= rot(t * 0.4);
    float torus = sdTorus(p3, vec2(0.7, 0.25));

    vec3 p4 = p - vec3(0.0, sin(t * 0.6) * 1.5, cos(t * 0.5) * 0.5);
    float sphere2 = sdSphere(p4, 0.5 + 0.15 * cos(t * 1.7));

    float d = opSmoothUnion(sphere, box, 0.8);
    d = opSmoothUnion(d, torus, 0.6);
    d = opSmoothUnion(d, sphere2, 0.7);

    // Ground plane (subtle)
    float ground = p.y + 2.5;
    d = opSmoothUnion(d, ground, 1.5);

    return d;
}

vec3 calcNormal(vec3 p) {
    vec2 e = vec2(0.001, 0.0);
    return normalize(vec3(
        scene(p + e.xyy) - scene(p - e.xyy),
        scene(p + e.yxy) - scene(p - e.yxy),
        scene(p + e.yyx) - scene(p - e.yyx)
    ));
}

void main() {
    vec2 uv = (gl_FragCoord.xy - uRes * 0.5) / min(uRes.x, uRes.y);

    // Camera
    float camAngle = uTime * 0.2 + uMouse.x * 3.0;
    float camHeight = 1.0 + uMouse.y * 2.0;
    vec3 ro = vec3(sin(camAngle) * 5.0, camHeight, cos(camAngle) * 5.0);
    vec3 ta = vec3(0.0, 0.0, 0.0);
    vec3 ww = normalize(ta - ro);
    vec3 uu = normalize(cross(ww, vec3(0.0, 1.0, 0.0)));
    vec3 vv = cross(uu, ww);
    vec3 rd = normalize(uv.x * uu + uv.y * vv + 1.5 * ww);

    // Ray march
    float t = 0.0;
    float d;
    for (int i = 0; i < 80; i++) {
        d = scene(ro + rd * t);
        if (d < 0.001 || t > 30.0) break;
        t += d;
    }

    vec3 col = vec3(0.02, 0.02, 0.04); // bg

    if (d < 0.001) {
        vec3 p = ro + rd * t;
        vec3 n = calcNormal(p);

        // Lighting
        vec3 lightDir = normalize(vec3(1.0, 2.0, -1.0));
        float diff = max(dot(n, lightDir), 0.0);
        float spec = pow(max(dot(reflect(-lightDir, n), -rd), 0.0), 32.0);
        float ao = 1.0 - smoothstep(0.0, 5.0, t) * 0.5;
        float fresnel = pow(1.0 - max(dot(n, -rd), 0.0), 3.0);

        // Color based on normal direction
        vec3 matColor = 0.5 + 0.5 * cos(vec3(0.0, 1.0, 2.0) + p.y * 0.5 + uTime * 0.3);

        col = matColor * (0.15 + diff * 0.7) * ao;
        col += vec3(0.8, 0.9, 1.0) * spec * 0.5;
        col += matColor * fresnel * 0.3;

        // Fog
        col = mix(col, vec3(0.02, 0.02, 0.04), 1.0 - exp(-t * 0.08));
    }

    // Gamma
    col = pow(col, vec3(0.4545));

    gl_FragColor = vec4(col, 1.0);
}`;

function compileShader(type, src) {
    var s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) console.error(gl.getShaderInfoLog(s));
    return s;
}

var prog = gl.createProgram();
gl.attachShader(prog, compileShader(gl.VERTEX_SHADER, vertSrc));
gl.attachShader(prog, compileShader(gl.FRAGMENT_SHADER, fragSrc));
gl.linkProgram(prog);
gl.useProgram(prog);

var buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1,-1,1,1,1,1,-1]), gl.STATIC_DRAW);
var ibuf = gl.createBuffer();
gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, ibuf);
gl.bufferData(gl.ELEMENT_ARRAY_BUFFER, new Uint16Array([0,1,2,0,2,3]), gl.STATIC_DRAW);
var aLoc = gl.getAttribLocation(prog, 'a');
gl.enableVertexAttribArray(aLoc);
gl.vertexAttribPointer(aLoc, 2, gl.FLOAT, false, 0, 0);

var uRes = gl.getUniformLocation(prog, 'uRes');
var uTime = gl.getUniformLocation(prog, 'uTime');
var uMouse = gl.getUniformLocation(prog, 'uMouse');

var mouseX = 0.5, mouseY = 0.3;

function resize() {
    canvas.width = Math.floor(window.innerWidth * 0.75); // Lower res for performance
    canvas.height = Math.floor(window.innerHeight * 0.75);
}
resize();
window.addEventListener('resize', resize);

canvas.addEventListener('mousemove', function(e) {
    mouseX = e.clientX / window.innerWidth;
    mouseY = 1.0 - e.clientY / window.innerHeight;
});

canvas.addEventListener('touchmove', function(e) {
    e.preventDefault();
    mouseX = e.touches[0].clientX / window.innerWidth;
    mouseY = 1.0 - e.touches[0].clientY / window.innerHeight;
}, {passive:false});

var startTime = Date.now();

function frame() {
    requestAnimationFrame(frame);
    var t = (Date.now() - startTime) / 1000;

    gl.viewport(0, 0, canvas.width, canvas.height);
    gl.uniform2f(uRes, canvas.width, canvas.height);
    gl.uniform1f(uTime, t);
    gl.uniform2f(uMouse, mouseX, mouseY);
    gl.drawElements(gl.TRIANGLES, 6, gl.UNSIGNED_SHORT, 0);
}

requestAnimationFrame(frame);

window.addEventListener('message', function(e) { if (e.data && e.data.theme) {} });
try { window.parent.postMessage({type:'widget-ready'}, '*'); } catch(e) {}

})();
</script>
</body>
</html>
