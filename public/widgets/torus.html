<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Torus</title>
<style>
    body { margin: 0; overflow: hidden; background: transparent; }
    canvas { display: block; width: 100vw; height: 100vh; }
</style>
<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    }
}
</script>
</head>
<body>
<script type="module">
    import * as THREE from 'three';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

    const scene = new THREE.Scene();
    scene.background = null;

    const camera = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 0.1, 100);
    camera.position.set(0, 0, 5);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.setClearColor(0x000000, 0);
    document.body.appendChild(renderer.domElement);

    const composer = new EffectComposer(renderer);
    composer.addPass(new RenderPass(scene, camera));
    const bloom = new UnrealBloomPass(new THREE.Vector2(innerWidth, innerHeight), 1.8, 0.5, 0.6);
    composer.addPass(bloom);

    // Wireframe torus knot
    const geo = new THREE.TorusKnotGeometry(1.2, 0.35, 128, 32, 2, 3);
    const mat = new THREE.MeshBasicMaterial({
        color: 0x667eea,
        wireframe: true,
        transparent: true,
        opacity: 0.6,
    });
    const knot = new THREE.Mesh(geo, mat);
    scene.add(knot);

    // Inner glow sphere
    const glowGeo = new THREE.SphereGeometry(0.6, 32, 32);
    const glowMat = new THREE.MeshBasicMaterial({
        color: 0x9d50bb,
        transparent: true,
        opacity: 0.15,
    });
    const glow = new THREE.Mesh(glowGeo, glowMat);
    scene.add(glow);

    // Particles orbiting
    const pCount = 200;
    const pGeo = new THREE.BufferGeometry();
    const pPos = new Float32Array(pCount * 3);
    for (let i = 0; i < pCount; i++) {
        const a = Math.random() * Math.PI * 2;
        const r = 1.5 + Math.random() * 0.8;
        const y = (Math.random() - 0.5) * 1.5;
        pPos[i*3] = Math.cos(a) * r;
        pPos[i*3+1] = y;
        pPos[i*3+2] = Math.sin(a) * r;
    }
    pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
    const pMat = new THREE.PointsMaterial({
        color: 0xf093fb,
        size: 0.04,
        transparent: true,
        opacity: 0.7,
        blending: THREE.AdditiveBlending,
        depthWrite: false,
    });
    const particles = new THREE.Points(pGeo, pMat);
    scene.add(particles);

    const clock = new THREE.Clock();

    function animate() {
        requestAnimationFrame(animate);
        const t = clock.getElapsedTime();
        knot.rotation.x = t * 0.3;
        knot.rotation.y = t * 0.5;
        particles.rotation.y = t * 0.2;
        particles.rotation.x = Math.sin(t * 0.3) * 0.2;
        glow.scale.setScalar(1 + Math.sin(t * 2) * 0.1);
        glowMat.opacity = 0.12 + Math.sin(t * 1.5) * 0.05;
        composer.render();
    }

    window.addEventListener('resize', () => {
        camera.aspect = innerWidth / innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(innerWidth, innerHeight);
        composer.setSize(innerWidth, innerHeight);
    });

    // Theme-aware: listen for dark/light from parent
    window.addEventListener('message', (e) => {
        if (!e.data || !e.data.theme) return;
        const isDark = e.data.theme === 'dark';
        bloom.strength = isDark ? 1.8 : 0.5;
        if (isDark) {
            mat.color.setHex(0x667eea);
            mat.opacity = 0.6;
            glowMat.color.setHex(0x9d50bb);
            pMat.color.setHex(0xf093fb);
            pMat.opacity = 0.7;
        } else {
            mat.color.setHex(0x3344aa);
            mat.opacity = 0.7;
            glowMat.color.setHex(0x553388);
            pMat.color.setHex(0x8855bb);
            pMat.opacity = 0.8;
        }
    });

    // Tell parent we're ready for theme
    window.parent.postMessage({ type: 'widget-ready' }, '*');

    animate();
</script>
</body>
</html>
